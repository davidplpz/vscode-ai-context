<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Network nodes representing skills connecting -->
  <!-- Center node (primary) -->
  <circle cx="64" cy="64" r="18" fill="#5C6BC0"/>
  <!-- Top-right node -->
  <circle cx="102" cy="32" r="13" fill="#42A5F5"/>
  <!-- Bottom-left node -->
  <circle cx="26" cy="102" r="13" fill="#26A69A"/>
  <!-- Connections -->
  <line x1="78" y1="53" x2="92" y2="40" stroke="#5C6BC0" stroke-width="8" stroke-linecap="round"/>
  <line x1="50" y1="78" x2="36" y2="92" stroke="#5C6BC0" stroke-width="8" stroke-linecap="round"/>
  <line x1="79" y1="75" x2="56" y2="88" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="48" y1="52" x2="34" y2="88" stroke="#5C6BC0" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- Small dot nodes -->
  <circle cx="70" cy="86" r="6" fill="#42A5F5" opacity="0.6"/>
  <circle cx="42" cy="42" r="6" fill="#26A69A" opacity="0.6"/>
</svg>
