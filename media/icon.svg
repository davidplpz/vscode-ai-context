<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Network nodes representing skills connecting -->
  <!-- Center node (primary) -->
  <circle cx="12" cy="12" r="3.5" fill="#C5C5C5"/>
  <!-- Top-right node -->
  <circle cx="19" cy="6" r="2.5" fill="#C5C5C5"/>
  <!-- Bottom-left node -->
  <circle cx="5" cy="19" r="2.5" fill="#C5C5C5"/>
  <!-- Connections -->
  <line x1="14.5" y1="10" x2="17.5" y2="7.5" stroke="#C5C5C5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9.5" y1="14.5" x2="7" y2="17" stroke="#C5C5C5" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="14" x2="10.5" y2="16.5" stroke="#C5C5C5" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="9" y1="10" x2="6.5" y2="16.5" stroke="#C5C5C5" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Small dot nodes -->
  <circle cx="13" cy="16" r="1.2" fill="#C5C5C5" opacity="0.6"/>
  <circle cx="8" cy="8" r="1.2" fill="#C5C5C5" opacity="0.6"/>
</svg>
